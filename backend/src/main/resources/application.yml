# application.yml — Configuración principal de la aplicación Spring Boot.
#
# Decisión de diseño: variables de entorno para datos sensibles.
# Los valores como contraseñas, URLs de BD y claves JWT NUNCA se hardcodean aquí.
# En producción, Docker Compose inyecta estas variables.
# En desarrollo local, application-dev.yml sobreescribe con valores concretos.
#
# Patrón: 12-Factor App (factor III: configuración en el entorno).

spring:

  # --- Base de datos ---
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # --- JPA/Hibernate ---
  jpa:
    hibernate:
      # ddl-auto=none: Hibernate NO toca el esquema.
      # Las tablas las crean los scripts SQL (01_schema.sql con IF NOT EXISTS).
      # Esto evita el problema de orden: Hibernate no valida antes de que existan las tablas.
      ddl-auto: none
    # defer-datasource-initialization=true: los scripts sql.init se ejecutan
    # ANTES de que JPA/Hibernate inicialice. Esto garantiza que las tablas
    # existen cuando Hibernate intenta mapear las entidades.
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # --- Scripts SQL de inicialización ---
  # mode=always: ejecutar en cada arranque (seguro porque los scripts son idempotentes).
  # schema-locations: crea tablas, constraints e índices (IF NOT EXISTS).
  # data-locations: inserta datos de referencia (ON CONFLICT DO NOTHING).
  sql:
    init:
      mode: always
      schema-locations: classpath:db/01_schema.sql
      data-locations: classpath:db/02_data.sql
      continue-on-error: false

  # --- Perfil activo ---
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

# --- Servidor HTTP ---
server:
  port: ${PORT:8080}
  address: 0.0.0.0


# --- JWT ---
# La clave secreta viene de la variable de entorno JWT_SECRET.
# Debe tener al menos 256 bits (32 bytes) para HS256.
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long}
  expiration-hours: ${JWT_EXPIRATION_HOURS:8}

# --- CORS ---
# Orígenes permitidos separados por coma.
# En producción, setear la variable de entorno ALLOWED_ORIGINS con el dominio del frontend.
# Ejemplo: ALLOWED_ORIGINS=https://mi-frontend.onrender.com
cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8081}

# --- Logging ---
logging:
  level:
    root: INFO
    com.easy.offers: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
