# nginx.conf — Configuración de Nginx para el frontend Angular.
#
# Nginx tiene dos responsabilidades aquí:
# 1. Servir los archivos estáticos de Angular (HTML, CSS, JS)
# 2. Hacer de proxy inverso para las requests al backend (/api/*)
#
# ¿Por qué el proxy inverso?
# El frontend en producción corre en el puerto 80 (Nginx).
# El backend corre en el puerto 8080 (Spring Boot).
# Si el frontend hace requests a http://localhost:8080/api, el navegador
# bloquea la request por CORS (orígenes diferentes).
#
# Con el proxy, el frontend hace requests a /api (mismo origen),
# y Nginx las redirige internamente al backend en el puerto 8080.
# El navegador no ve el cambio de origen → no hay problema de CORS.

server {
    # ${PORT} es reemplazado por envsubst al arrancar el contenedor.
    # Render inyecta PORT con el valor del puerto asignado (ej: 10000).
    # envsubst procesa el template y genera el nginx.conf final.
    listen ${PORT};
    server_name localhost;

    # Directorio raíz donde están los archivos compilados de Angular
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy inverso para el backend ──
    # En Render con un solo contenedor Docker, el backend corre en el mismo
    # host pero en el puerto 8080. Usamos localhost en lugar del nombre de
    # servicio de Docker Compose (que solo funciona en redes Docker internas).
    location /api {
        proxy_pass https://spring-boot-docker-1-ooxb.onrender.com/api;
        proxy_ssl_server_name on;                          # ← agregar esto
        proxy_ssl_name spring-boot-docker-1-ooxb.onrender.com;  # ← y esto
        proxy_set_header Host spring-boot-docker-1-ooxb.onrender.com;  # ← y esto

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Archivos estáticos de Angular ──
    # try_files: intenta servir el archivo solicitado.
    # Si no existe (ej: /dashboard), sirve index.html.
    # Esto es necesario para que el Router de Angular funcione correctamente.
    # Sin esto, al recargar /dashboard, Nginx buscaría un archivo "dashboard"
    # que no existe y retornaría 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caché para assets estáticos (imágenes, fuentes, etc.)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
